  text: 玉清贊化九天演政心印集經道藏輯要箕集十玉清贊化九天演政心印集經
  hash: sha256:02f385021df57bc7b39b6dacbc1e16f187a38cbb9c84345eff28ac0d37d7ccd6
  markers:
  - {type: page-break, offset: 12, content: '', id: YP-P_KR5i0021_02p001a}
body:
  text: 玉清演教金闕選仙上清三館脩文大學士秉令神霄掌風雲雷雨電知水火木金土五部尚書事文昌玉局筆籙大宗師玉斗左宫瑶天使相總領九天心印經法全籙都提總臣白玉蟾誠惶誠恐稽首頓首百拜承恩跪啓金凾遵譯世楷按法以傳玉清贊化無上大天尊三稱祥雲馥郁瑞氣氤氲羅天海嶽遍遥聞列聖盡來臨賜福乾坤大地獲清寕大聖香雲達信大天尊三稱淨心神咒太上台星應變無停驅邪縳魅保命䕶身智慧明淨心神安寕三魂永久魄無䘮傾急急如彾淨口神咒丹朱口神吐穢除氛舌神正倫通命養神羅千齒神却邪衛真喉神虎賁氣神引津心神丹元令我通真思神煉液道氣常存急急如彾凈身神咒靈寶天尊安慰身形弟子魂魄五臟元㝠青龍白虎隊仗紛紜朱雀元武侍衛我真急急如彾安土地神咒元始安鎮普告萬靈嶽瀆真官土地袛靈左社右稷不得妄驚回向正道内外肅清各安方位備守壇庭太上有命收捕邪精䕶法神王保衛誦經皈依大道元亨利貞急急如彾浄天地神呪天地自然穢氣分散洞中元虚晃朗太元八方威神使我自然靈寶符命普告九天乾羅怛那洞罡太元斬妖縛邪殺鬼萬千中山神咒元始玉文持誦一遍却病延年按行五嶽八海知聞魔王朿手侍衛我軒兇穢消散道炁常存急急如彾金光神咒天地元宗萬炁本根廣脩億刼證我神通三界内外惟道獨尊體有金光覆映我身視之不見聴之不聞包羅天地養育羣生受持萬遍身有光明三界侍衛五帝伺迎萬神朝禮役使雷霆鬼妖䘮膽精怪亡形内有霹靂雷神隱名洞慧交徹五氣騰騰金光速現覆䕶壇庭急急如彾衛靈神咒五星烈照煥明五方水星𨚫災木徳致昌熒惑消禍太白辟兵鎮星四據家國利亨名刋玉簡字錄帝房乘飈散景遊宴八鄉五雲浮盖招神攝風役使萬靈上衛仙翁急急如彾祝香神咒道由心學心假香傳香爇玉爐心存帝前真靈下盻仙斾臨軒聆臣所唘咸賜如言具有情辭謹當敷奏入意情辭已達衆聖咸聆謹運精䖍開經如法開經偈雲篆太虛浩刼之初乍遐乍邇或沉或浮五方徘徊一丈之餘天真皇人按筆乃書以演洞章次書靈符元始下降真文誕敷昭昭其有㝠㝠其無沉疴能自痊塵勞溺可扶幽明皆有頼由是昇仙都時為心印寶窮刼不消磨人能常持誦世與天為徒玉清贊化九天演政心印集經巻上道言元始天尊在玉清聖境清微天宫鬱羅蕭䑓之上講説包濛太極之用混宇馭世之體是時諸天帝真無極皇人金仙帝釋上品靈聰億億萬衆含貞毓道吞經吐法徵往觀來歡欣諦聽忽一侍宸號曰文尼至真皇人越班而出端𥳑長跪白天尊言臣自溯龍漢初年恭奉玉清神母元君懿旨爕元贊運溥化人天臣是以和志暢神恊俾道體同寰一性同覺一光化育宏敷陶五百刼凡夫學士盡得飛昇仰䝉天尊大慈天尊大悲上奉神母熈臣庶績綏臣在位臣愚以夙因雖了本願無窮今幸逢慶會咀聽法音神繫曩謨志逮元應俯推來世皇方丕運帝應昌期五行逓生三才斯奠仰觀刼仞寶䑓俯𦕎紫雲彌羅普䝉天尊賦予動植棲潛森森玉宇旣草旣鼎乃豫乃豐諸色香聲味之漸開臆嚚訟敷讒之卽啓臣愚言道包德奥而神化必加臣愚從侍天尊閱無量刼備司鐸化奕贊元光演政興行職臣斯責願仗天尊心印優敷十方鋪著神風津颺梵炁俾惡道苦魂端而不證鐵圍酆都兆而不成天人永慶寶光常明六合三徑帷遼非遼延康永祚視民不佻下臣至愚下願至微頫顖道前大慈大悲天尊言曰文尼大慈文尼大悲文尼心印印契道心無諸心印有諸心印文尼自有心印有諸心印無諸心印文尼果何心印文尼以心印心以印心印苟無來刼何有往刼文尼是以陶五百刼旣有往刼絶無來刼文尼何以閱無量刼生生化化太極融融生化化生馭世以庸天寶以道包靈寶以徳奥神寶以神化粤越三百刼塵當得八十一化青尼致中仲尼時中牟尼空中三尼師師文尼翼司三尼克傳文尼斯贊天不可以有陽而無隂水不可以有清而無濁地不可以有澤而無山人不可以有生而無化天無隂何以全陽水無濁何以澄清地無山何以通澤人無化何以廣生天抑隂以扶陽水沉濁以揚清地甸山以浚澤人根化以基生夫惡道苦魂端以輪化工銕圍酆都兆以轉生氣故太極逓元塵刼逓運而恊之贊之職文尼是命文尼大悲文尼大願文尼仍宏敷教育禆生化之源于是文尼至真皇人怡神遐想稽首悟謝再拜而起敬謹復位逡巡待時天尊言曰昔我神母以妙無之無以化生也因現以妙有以妙有之或失淪胥也因存以至真以混宇之無以開物也因著以象形以洪荒之無以成務也因配以神人以天野之無以璇璣也因建以斗極以天政之無以執符也因開以金關以天人之無以教育也因作以君師于是治法畢張神風咸煽惟天蕩蕩妙道興行神等衆眞各發大神通願大神通力大慈悲願大慈悲力大喜捨願大喜捨力大忍辱願大忍辱力大平等願大平等力大柔和願大柔和力大自在願大自在力大利益願大利益力大如意願大如意力大智慧願大智慧力大吉祥願大吉祥力大觧脱願大觧脱力大皈依願大皈依力大功德願大功德力大圓滿願大圓滿力大無礙願大無礙力無能勝願無能勝力以章十七大光明神等功德與道同光我當宣説未來世凡夫學士求道念切能發一大願者卽得天神覆䕶魔王保迎至真皇人授以妙道保合太和盡性致命行滿功圓能具一大力者即得飛昇金闕游宴玉京以自有本行光明能照蔭故神等眾真同此法筵同此法體同此法願同此法力同此法光同此法濟至真皇人授道傳經天真皇人䕶道降魔歴運中午真正同符時運至斯三皇代馭五帝逓臨水土旣乎鳥獸眘目弓邉邑讀村耕民富士殷金仙代帝玉女樂𡚱物阜財豐安飽䖏奢于是時也化之不警徳以日渝佑之不孚行以日偷化之不純妖以訛興佑之不顯信以訛岐至真天真左右皇人大願大力具大光明全之正之真一道存神等眾真在天為神在地為靈在人為元大淨大明天降斯道地産斯寶人宣斯文二龍五老靈開之宫金葢龍虎之峯玉局再從法判五雷道齊七政六合無窮三教演政爾時至真皇人天真皇人從左右出長跪道前拱手加額俱發聲言臣等幸會法筵仰䝉天尊流煥法輪垂大法語將使臣等勷化人天教導無窮臣等臆未來世何以仰承道旨伏望慈悲賜臣未得言畢頓顙戀求俯伏不起爾時天尊遐想良久高抗未言鬱單無量天帝自坎位出上上禪善無量夀太虚天帝自離位出梵監須延天帝自震位出寂然兜術天帝自兑位出波羅尼密不驕樂天帝自中極出洞元化應聲天帝自艮位出靈化梵輔天帝自坤位出髙虚清明天帝自巽位出無想無結無愛天帝自乾位出各各長跪拱手和聲白天尊言臣等邁侍三清行持九炁仰頼天尊道力御運九天玉帝光明流形萬品以玉閤陽靈之粹點金樓隂耀之精纒蒼赤青緑黄白紫碧黒之光周胞胎魂魄臟腑竅景神之體刼年超邁敬唱密符故得元關斷死紫府生仙臣等以玉虚生神端予九炁玉清贊化職彼二真臣愚以凡聖一流均秉靈光道炁虫虫氓子生死蜉蝣彼力不圓曷由濟兆使内閫種民輕舉尅期四表烝生延年益慶臣聞太元玉都寒靈丹殿紫微上宫靈都秘館所藏金書五方三元符命實天地之元宗萬炁之本根無上大不可思議靈寶妙徳臣等以二真廣修億億刼其威靈恢廓普加無窮將開神仙之宗立真靈之極分相玉清内外贊蕩蕩之大化永馭五方不可少此伏願天尊予此天寶證彼神通神表化敷其量莫測于是天尊慨爾歎曰元乎旨哉子等所啟豈不韙乎此元始祖刼之靈根神母元君之妙諦今法運訖當見雜氣橫流雜法橫布歴三百刼盭運始消真皇出治金符玉格自然應行當使二真共馭以輔相天地之宜財成天地之道今且可相付二真但詣上館敬録而寶佩之未得宣于開聽子等復位吾當簡付于是九帝二真各各稽首惶感謝恩九帝各復其位天尊乃告五老上帝曰昔我神母括虚無之妙探浩刼之原以運自然眞文是名大光明圓滿大神咒玉章以運御乾坤我時諮爾以禁戒之儀開洞陽秘館冶玉篇真文藏之靈都稱無上寶今至真搜元天真求靈子可會詣金闕轉登上館嘯命神王披九光靈之匱出三元符命之書以肇來勳欽哉即往是時五老上帝各各稽首丹拜命辭者三起會二真徑投金闕朝禮玉皇旋詣上清皈依靈寶嘯命十方當爾之時天開黄道地湧金蓮珠實寶華星燦雲爛無量元瑞莫可罄言錦囊旣出玉版羅陳東方安寶華林青靈始老蒼帝所出三元符命九駕命天龍符保眞多川災水不敢彌天天真皇人云右九炁青天下元小陽九巳小百六午其年大災除民蒼帝出下元符命下東嶽保存萬物安國康民制九炁青天分度以度學者之身中山神咒易爲神臣度人命籍萬災不纒天真皇人云右中元太陽九申大百六酉其年禾稼俱衰蒼帝出中元符下東嶽蔭育萬物制天分度以度種民大災要崇上王命爲保真一人有道位侍九真天真皇人云右上元大刧交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光明蒼帝出上元符下東嶽保存萬物制九天炁以度學者東嶽青帝云此三元符命保固青天元始之炁佩之皆得始分之中其文九千年一出大刧交周當刻書金札以佩身符命皆青書白繒蒼帝隨言曰此神母元君自然真文冶成元始真符玉皇真命以統御九炁應運三元以保固青天南方梵寶昌陽丹靈真老赤帝所出三元符命正一命人長生上天天真皇人云右三炁丹天下元小陽九辰戌小百六丑未其年土中生火萬物自死赤帝出下元符下南嶽保存萬物安國康民制三炁丹天分度以度學者之身萬川洪流符吏水母竭焉天真皇人云右中元太陽九亥大百六子其年火滅水出赤帝出中元符下南嶽度兆民災制天分度消滅水火之厄日月力出王平山東火災不起人民臣天真皇人云右上元大刧交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光明赤帝出上元符下南嶽保度萬物制九天炁以度學者南嶽赤帝云此三元符命保固丹天元始之炁佩之皆得始分之中其文九千年一出大刧交周當刻書金札以佩身符命皆赤書黒繒赤帝隨言曰此神母元君自然真文冶成元始真符玉皇真命以統御三炁應運三元以保固丹天中央高皇玉寳元靈元老黄帝所出三元符命天徊月移刧運無傷天真皇人云右一炁黄天下元小陽九申小百六酉其年霧障迷天不分晝夜黄帝出下元符下中嶽保存萬物安國康民制一炁黄天分度保度學者之身丁均有命勿句存玃爲無育見乾坤天真皇人云右中元大陽九寅大百六申其年山川俱壞黄帝出中元符下中嶽度種民制天分度固地炁禳除災厄出陽入隂壞山川九土欲崩符不傾頽天真皇人云右上元大刧交周天地改易金玉山海人民鳥獸一時滅盡天地溟涬無復光明黄帝出上元符下中嶽保度萬物制九天炁以度學者中嶽黄帝云此三元符命保固中央黄天元始之炁佩之皆得始分之中其文九千年一出大刧交周當刻書金札以佩身符命皆黄書青繒黄帝隨言曰此神母元君自然真文冶成元始真符玉皇真命以統御一炁應運三元以保固中天西方七寳金門皓靈皇老白帝所出三元符命西山注鬼煥乎九天醜力難逼斬以金闗天真皇人云右七炁素天下元小陽九亥小百六子其年人民萬物被水漂蕩白帝出下元符下西嶽保存萬物安國康民制七炁素天分度以度學者之身日爲正王陽生三斬殺萬魔雲龍間天真皇人云右中元大陽九巳大百六午其年兵革四興白