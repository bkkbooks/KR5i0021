元始心印以復修神母懿旨爾時玉帝説是語已卽勑諸天帥將萬法神君及一切效靈將士遍與純陽真人分符剖劵玉帝親為證盟純陽真人復稽首無算俯伏奏言惟帝大慈無量無邉微臣縱叨帝力得圓本願以度盡窮刼萬靈亦何足報恩于萬一矧臣徳罔克民不依臣惟日孜孜思日贊贊襄哉玉帝曰俞往欽哉于是無量神王前齎玉勑簡章符誥及大琅王函運諸藏寶擁䕶純陽真人及諸僚屬各各拜辭而出俄而祥光頓湧遍衝諸天雲鶴盤空金鈴四震千幢萬纛上下飛騰三冕九旒自遥而集雲車風馬如矢脫弦鳳葢霓旌飄揚闕外鸞鳴鳳唱龍戲麟盤諸天寶花繽紛而散珠光劍氣出自斗牛繼見九地開光九天章慶五星四曜列宿諸星一切曹部咸詣靈開真人靈姿妙粹瑞相端妍秉太元碧琳之圭衣九光紅霽之帔冠偃月金晨之冠履天風朱光之履曳玉銖之袂服海嶽之裳五印凝丹一劍橫素上清五百珠吏握蒼龍監兵之符太微四六瑶仙掌金虎飛雲之印十二溪女騎玉鰲而跨金鯨一九江神馭錦蛟而坐翠蜃三官執籍校天地山海之圖六丁操戈守日月星辰之籙四方列宿曹官簿注吉凶十二宫神將吏典持賞罰左防觀而右䕶法前飛遼而後延精金鉞橫霜錦牙耀日四帥麾節驅雷翁電母之羣五嶽旌旗奮風伯雨師之陣九州社令把社稷城隍之書八海龍君捧龍蛇魚鱉之典司命翼駕典禁侍軒簫鼓盈空鈞天九奏僚各屬濟濟莊嚴真人一一考按旣畢遣送神王仍來金𨶔復鍳真人放大光明播于九宫上映九天下澈九壘徧照九州萬國之地𨶒浮世界之中山窮水僻之鄉幽野暗室之内皆成金碧靈寳元壇雖穢濁惡䖏盡成聖境真人卽分其身化無量身徧于是䖏其諸僚屬亦各化身相從徧于是䖏其六道四生各就所近而至皆得聞言開悟其三教種子皆得心若明星各發文章性與天道轉相導引其外道諸魔溥加懾服一切惡鬼水怪風妖孽龍妖神魑魅魍魎皆自皈依化為䕶法仁風徧宇道氣充天于是玉帝睹兹化工而誥諸聖衆曰是教化主歴運慈師生浩刼前運化古今大悲大願無等無倫妙號文尼至真皇人是光明藏大丈夫大慈明王大力醫王十方信應三界皈依六道四生大慈父王是真種子孝悌王梅島飛仙蓬萊元鎮方丈嚴師道徳至人太上靈寶儒釋道人是功徳身大藏王歴刼帝師九州慈度玉都師相檢校太師靈寶天師元梵大帝是九天御史九嶷真人運元保命元夷真君是選仙首金仙領袖五雷判府九天採訪便宜使者降魔都督元都啓化演政宗師先天太極救苦大仙是東華帝子紫府王孫全真演教元應祖師神功無極至徳無名八洞元老文尼道君是虚中昌老三教綱維天曹逸史大洞真儒瑶池校録演教談經六府總領孚佑元皇是中天聖師無上宫主竺國嘉賔梵天上輔北極元宰金蓮正印三微秉鐸玉晨元精職理辰曜秉令璇璣九皇贊仰闡教真人是雷霆教主靈寶真人九天演政三界行人持刼濟世警化主人萬天司鐸純陽真廣慈尊是三十三天大法宫保金蓮臺上代佛揚化統領衆生扶理元陽總督九關天騶律令華葢掌道大士龍沙會上元師是天雷上相玉清内相香林上宰蕭宇元臣欝羅妙應天寳侍宸三會扶教無量度人靈運造化協元上帝是大乘文王尊勝大士雷天頂輪王菩薩圓通自在文尼真佛東土廣化如來爾時玉帝說是誥已諸天聖衆各各歡喜稽首回向異口同聲而稱讚曰玉帝大慈悲光明以選仙選仙大願力普度諸人天應現徧幽延分身消塵刼神化不可測功徳歎無極三教大師尊諸臣莫與京妙道若虚空巍巍難可稱時諸聖衆稱是讚已與諸選仙各復稽首歎福無窮奉辭而退玉清贊化九天演政心印集經巻中終讚金經二巻奉誦周圓靈開北上化洪宣立極鎮中天福徧幽延功徳歎無邊昊天金闕玉皇大天尊三稱讚金經二巻奉誦周圓上宫再講大成原真聖悉莊嚴聖治長年䖏䖏樂堯天玉清贊化無上大天尊三稱玉清贊化九天演政心印集經巻下爾時文尼道君上奉玉皇便宜恩㫖在靈開真境金葢仙治無上宫中與諸真人講說三教大成之原救苦度人之道是時雷霆五師五方總領二祖八宗司使院長十直勘案都正都䕶經法都籙中宫鎮治九州糾察三元巡案二十八治宗師二十八院院真三十六曹總案二十四靖真宰九州元壇神仙聖衆三元巡案十四萬衆治院曹靖中無量衆真翊駕都䕶十二靈官中宫五司十直靈官六十日直靈官百八十衆萬法效靈神仙雲騎俱已降生復升師師濟濟恪恭莊嚴清標建節侍在側焉爾時道君告諸真衆曰吾膺帝命演政九天救刼開化經人間九百年于兹矣仰叨元始道力玉帝聖慈天母神光官人盛徳故得諸天景仰大地欽崇四海昇平九州樂育方方闡教䖏䖏開壇睹諸種民熈熈皥皥三綱攸叙天下太平海隅日出罔不率俾聖君賢臣治于無為靈瑞叢生景運迭開實化運之中午適當聖治之長年爾諸真靈昔承帝訓刼刼降生現身說法或法施于民或以死勤事或以勞定國或能禦大災或能捍大患皆生生累行世世積功濟度人天示人常道今者安䖏天宫同心司化當知種草不齊有教無類皇風蕩蕩遍宇皆春無不可化之民人而入道莫先于敦本夫道之為道昭昭在人性所同具非由外鑠乃先天一炁之宗㫖混元無極之根源下世人民塵欲未滌照心罔拭未能體天地之心以立絳宫崇道徳之本以資深造苟不日疏其源而旦塞其流必將習趨日下詐罔日滋故我世尊導以空禪拔之幻海聖子首崇心學率以真功是知道之立基不外人心忠孝出忠入孝則無䖏非心居敬存誠則無䖏非天心合乎天卽敦其本本旣敦矣道基已立夫道基旣立則行無輕薄身知愛惜已斯時也功莫切于閑邪蓋人心惟危道心惟微不有所閑仍流妄僞妄則招釁僞則欺天須𡨴靜其中存心于正不為貪引養氣于平不為事奪以心制心則心不外馳以性養性則性無内違守天根之炁煉月窟之精體如明鏡用如流泉外無所蔽内無所遣夫物不相䝉何有于妄欲不能牽何有于偽妄偽不生心性自明心性不鑿精神自足于是以未發之性致之至中内無煩惱以已發之性致之至和外無是非意周身而不紊心印性以無違炁有若無神實若虚犯而不較愛之如遺不浮游于榮辱不顚倒于事宜任物物之紛錯我自得夫樞機于此而使善不知為身不知脩徒參心性則心何以神性何以明神明未達何以入聖凡兹下民更當上達三元下宏萬化以清靜為基以無為為體以存誠為用以柔弱為守以堅忍為行以精進為心以决烈為志以廣大為歸視天地萬物無一不在我心性之中視天地萬物無一可為我心性之礙以我心之真淨化天下之貪染以我心之克明化天下之䝉昧以我念之必忠化天下之迷罔以我願之大慈扶天下之急迫以我願之大悲救天下之苦難以我力之無怠揚吾教之無邉尤當不希陽福不惑隂奸不縈物累不畏剌言惟以至誠為本挽天下于至善則率自誠以見性自明以立教不偏不倚成始成終斯可謂錫吾保極得吾心印者也如識見未超學力未到僅知有道而不知道之徳統乎天僅知有我而不知我之備萬物者則末矣故屏跡風塵逃名山水棄絶妻子蕭居蓬蓽即有出世之心而無出世之志者也若但配煉坎離抽添鉛汞動裏黄芽靜中白雪此乃太上一隅之傳縱饒手眼猶然中士若言咒棗鳴雷飛符噀水得一遇而行一事救一病而立一功使不以太上好生之心為心則法固效矣功固有矣吾尚疵其力之未廣必也變通無礙曲成不遺乃為得吾之心印道言無一物非天無一物非命故㝠默有自然之宰枯榮為一定之衡誠不可為不可致不可測不可分之理也世人罔識元微偏欲以妄勝天以貪爭命此無徃而不獲其悔吝者夫天與命脩之猶播穀也成之猶收稼也田有肥磽𡻕有豐歉未可以彼此而生異同勉强而生悔尤惟勤我耕鋤之勤以任其自然之穫乃為達者凡兹下民當窮理盡性見機明决知天道之惡盈也必先含之以虚知人事之無常也必先存之以退知順境之難繼也必先本之以和知事理之難能也必先行之以慎知福分之難邀也必先守之以足知艱險之可慮也必先權之以變怡怡然不以得失而先後其心坦坦然不以窮通而損益其節乃為通元深造可以得我心印若道未進乎髙明身先溺于煩惱將見萬緣在前不能鎔之為元却盡化之為孽故道莫貴乎自明功莫切乎自省炎炎者勿直任其性滔滔者勿過溺于情養我之性周流萬物息我之情茂對蒼生夫烏可以先天之真性受制于物以未鑿之良心受制于情彼旡妄之魔能蟯我以動不能撓我以靜無明之火能滅我于濁不能滅我于清故曰天地雖大能役于有形而不能役于無情隂陽雖妙能合于有氣而不能合于無心總心之所至氣即從之形之所寓情即引之人能置此身于太虚化萬物于無有過而不留動而能定與物徃來無縈無擾何有于忿何有于欲哉凡兹下民悟斯道者臣可無禍于朝子可無罪于家夫婦昆弟朋友之交皆可無過于倫理不亷者知分而不貪不忍者知和而不辱不慎者知謹而無咎不裕者知足而能守不柔者知退而不觸不節者知嚴而慎獨脩此則水火不相違行藏自安適身世有時窮飛歩登金闕吾哀下民初聞吾言則進銳直前歴之稍久則怠惰廢弛或移情于名利或惑志于讒言或懷迷于色相或憂慮于未然或紛摇于恚怒或失守于情縁或難堅于澹泊或希效于旦夕所以至道日遠珠璣莫剖爲之者若牛毛成之者如麟角也吾願窮刼蒼生覺此身之有盡知我極之可歸立無限進心發甚深苦行日用不舍夢寐不違造次如是顛沛如是行住坐卧亦如是處安常而警䇿履險巇而加勤乃可進見雲龍吐吞舍利越上乘而登無極也否則徒廢青年空嗟白首縱入寶山歸而空手不觀千仞之木培之百年接空之嶺奮于一簣其間之艱難辛苦與反覆憂勤吾安忍别其危微而談其究竟哉全頼九州侍壇真衆循循善導提携斯民斯民獲罪于天吾與諸真共之爾時道君説是語已忽一真君號曰紫清從座而起稽首再拜白道君言祖師大慈祖師大悲哀矜下民宣兹大訓晜孫仰頼元慈備員提總謹按四院八庫之所藏自開壇迄今大半籙傳下土竊鍳九州以身體經以經得道以道行法以法持身者不可多得且有無知之輩道徳不盈簣輙輕躁登壇所補法銜則卿師使相所召將吏則千百姓名徒取炫燿不求靈騐即有力求靈騐者以驅神附體爲竒以移光入影為妙以影跡夢想為神號召失儀奏章誇誕徒賈人見不畏律嚴晜孫竊念太上作爲符法特以付有道士于不得已之事一行原使代天宣化為國救民䕶道降魔斡旋造化無非遵道而行不為索隱行怪故陳章奏牘所以開懴謝之門也飛神馭氣所以入朝謁之路也傳真度妙所以襲真一之風也陞秩登班所以按薦舉之法也承流宣化所以闡驅禳之教也芟邪立正所以崇清靜之道也今舉世黄冠不顧根本妄發符印觸怒鬼神不知如是行持猶以赤體而㭮白刃晜孫至愚哀兹下民以為赤子入井誠宜憐憫晜孫仰托元蔭上沐帝恩總領九天心印職當曉以法律力挽其流以使盡歸宗教今幸逄法會九州真衆咸侍道前晜孫得攄悲憫之忱伏望祖師俯為印可俾衆真普加警化焉夫行法有大不易者七有深可畏者六即如世俗澆漓風教隳墮迷迷相指以盲指盲此則遇真師之難文書謬誤訣法乘舛罡中落歩咒中漏句此則得真法之難科戒嚴明條律警肅難行易犯迷真者多此則奉真戒之難坌火焚和滛風鼓善正氣斵䘮元精彫敗此則全真氣之難上真威儀神將服色一念不純方寸難思此則存真想之難天神地祗正直威嚴監功建節紏察毫此則辦真心之難朝昏告急寒暑請行不敢苟財愈當戮力此則立真功之難所以為大不易者七也所傳法書符圖印訣妄示匪人必招風雷地獄鋒㦸裂體之報所禀戒律非時外色輒有侵犯必招灰池地獄火熖烙體之報欽奉三寳朝謁真靈不知避忌必招火綱地獄風刀考身之報神將香火朝夕不虞號召失節必招寒冰地獄黄繩朿頸之報用心輕重䖏事髙低或勤或惰必招鐵丸地獄犂牛耕舌之報行法旣顯必有襯賄多致貪婪必招黒暗地獄萬苦逼身之報所以為深可畏者六也以此七之大不易六之深可畏言之晜孫雖安䖏天宫猶為聳肩縮頸心痛鼻酸况茲下民方寸未澄澈者豈知道之清靜訣法未靈騐者豈知教之驅禳言行未純粹者豈知法之薦舉真偽未辨明者豈知風之真一形神未洞融者豈知路之朝謁迷愚未警悟者豈知門之懴謝此乃不易之理也而志士有心願行道法晜孫以為必先悛心首過然後可以陳章奏牘凝精聚神然後可以飛神馭炁鞭心學道然後可以傳真度妙正心誠意然後可以陞秩登班盡心利物然後可以承流宣化洗心潔已然後可以芟邪立正庶幾知難而易知畏而安罪過不招以希利濟祖師以為然耶否耶道君曰子之言然惟衆真廣布斯言于是在會衆真各各稽首再拜領命已紫清真君復言曰晜孫伏按法為道之用道實法之體竊鍳下民不先務道而徒務法故頗招顚殪操刀之患晜孫原其由來皆因雜法開化邪術橫行或言採補或言搬運或言服食藥物或言擦摩導引或言吐納或言奪舍或言燒煉黄白或標正㫖而以文隱義或執偏見而以巧飾非雖各部所傳間含元意以引人入勝不知舍路而徑滋獘無窮使智者見之以為秘訣愚者得之以為真傳不揣寓意而習其文遂致不顧天命不顧性道或招法誅或招病亾且種種匪人假圫教名以便私欲誣拉得道真人以為憑證以誑惑志士以䝉蔽宗㫖竟使真一大丹之道晦而不明卽或有遇之者亦心如玉石之無分不知何從何去卽如玉皇心印妙經實道藏之至寶人亦視為具文誦而不揣以致九州大地億無一成天生烝民而魔死之深宜哀憫晜孫曩刼降生從師學道晜孫師陳陳師薛薛師石石師張張師劉劉師祖師晜孫之學正祖師脉脉心傳晜孫惟從師辨惑不染旁門遂得片餉凝結期月成功仰䝉玉帝嘉祖師心傳妙道簡晜孫以玉清演教復䝉帝選登選仙首遂握雷霆之權秉樞機之政總道法之要開筆籙之宗更以夙願度人仍屬祖師以任斯職晜孫童髫何知自䕶毛羽此皆祖師聖聖相承之所賜晜孫在世亦深恐邪能蔽正謹記師傳要語直言直筆僭製脩仙辨惑論一篇刋以傳世復以舉世皆惡其害已也置而不傳今從祖師開化人天謹當折衷道前帷願慈悲俯賜證盟表率世俗以正人心以辟邪説以拒詖行以放滛辭使大丹宗㫖昭然于人天耳目之間窮刼萬靈豈勝幸甚于是道君閱是論已而告諸真衆曰陳氏之子其天人大導師乎是辨惑論者真太上之心傳金仙之正的聖門之玉匙道㟁之金蹬宜白氏子秉鐸諸天而應瓊琯先生妙號卽此刋傳功徳已足繼邱氏子而登選首矣人能體此勤行則法何難行吾願亦何難滿其文簡切明該與玉皇心印妙經相為綱目衆真咸當諦聴傳度人天其功徳力莫可思議于是紫清真君卽于會前朗誦以宣其文曰海南白玉蟾自幼事陳泥丸忽已九年偶一日在乎卷阿松隂之下風清月明夜靜煙寒因思生死事大無常迅速遂稽首再拜而問曰玉蟾事師未久自揣福薄縁淺敢問今生有分可仙乎陳泥丸云人人皆可况于汝乎玉蟾曰不避尊嚴之責輙伸僭易之問脩仙有幾門煉丹有幾法愚見如玉石之未分願與一言㸃化陳泥丸云來吾語汝脩仙有三等煉丹有三成夫天仙之道能變化飛昇也上士可以學之以身為鉛以心為汞以定為水以慧為火在片餉之間可以凝結十月成胎此乃上品煉丹之法本無卦爻亦無斤兩其法簡易故以心傳之甚易成也夫水仙之道能出入隱顯也中士可以學之以氣為鉛以神為汞以午為火以子為水在百日之間可以混合三年成象此乃中品煉丹之法雖有卦爻却無斤兩其法要妙故以口傳之必可成也夫地仙之道能留形住世也庶士可以學之以精為鉛以血為汞以腎為水以心為火在一年之間可以融結九年成功此乃下品煉丹之法旣有卦爻又有斤兩其法繁難故以文字傳之恐難成也上品丹法以精神魂魄意為藥材以行住坐卧為火候以清靜自然為運用中品丹法以心肝脾肺腎為藥材以年月日時為火候以抱元守一為運用下品丹法以精血髄氣液為藥材以閉嚥搐摩為火候以存思升降為運用大抵妙䖏不在乎按圖索驥也若泥象執文之士空自傲慢至老無成矣玉蟾曰讀丹經許多年如在荆棘中行今日塵浄鑑明雲開月皎總萬法而歸一包萬幻以歸真但未知正在于何䖏下手用功也陳泥丸云善哉問也夫煉丹之要以身為壇爐鼎竈以心為神室以端坐習定為採取以操持照顧為行火以作止為進退以斷續不專為提防以運用為抽𣷹以真炁薰蒸為沐浴以息念為養火以制伏心身為野戰以凝神聚炁為守城以㤀機絶慮為生殺以念頭動䖏為元牝以打成一塊為交結以歸根復命為丹成以移神為換鼎以身外有身為脱胎以返本還源為真宗以打破虚空為了當故能聚則成形散則成炁去來無礙逍遥自然矣玉蟾問曰勤而不遇必遇至人遇而不勤終為下鬼若此脩丹之法有何證騐陳泥丸云初脩丹時神清氣爽身心和暢宿病並消更無夢寐百日不食飲酒不醉到此地位赤血換為白血隂氣煉成陽氣身如火𤍠行步如飛口中可以乾汞吹氣可以煮肉對影無心如如不動役使鬼神呼召雷雨耳聞九天目視萬里徧體純陽金筋玉骨陽神現形出入自然此乃長生不死之道畢矣但恐世人執着藥物火候之説以為有形有為而不能頓悟也夫豈知混沌未分以前焉有年月日時父母未生以前焉有精血氣液道本無形喻之為龍虎道本無名比之為鉛汞若是學天仙之人須是形神俱妙與道合真可也豈可被隂陽束縛在五行之中要當跳出天地之外方可名為得道之士矣或者疑曰此法與禪學稍同殊不知終日談演問答乃是乾慧長年枯兀昏沉乃是頑空然天仙之學如水晶盤中之珠轉漉漉地活潑潑地自然圓陀陀光爍爍所謂天仙者此乃金仙也夫此不可言傳之妙也人誰知之人誰行之若曉得金剛圓覺二經則金丹之義自明何必分别老釋之異同哉天下無二道聖人無兩心何况人人具足箇箇圓成正所謂䖏䖏緑楊堪繫馬家家門閫透長安但取其㨗徑耳玉蟾曰天下學仙者紛紛然良由學而不遇遇而不行行而不勤乃至老来甘心赴死于九泉之下豈不悲哉今將師傳口訣鋟木以傳于世惟此泄露天機甚矣得無譴乎泥丸云吾將㸃化天下神仙苟獲罪者天其不天乎經云我命在我不在天何譴之有玉蟾曰祖師張平叔三傳非人三遭禍患如何泥丸曰彼一時自無眼力又况運心不普乎噫師在天涯弟子在海角何况塵勞中識人甚難今但刋此散行天下使脩仙之士可以尋文採義妙理昭然是乃天授矣何必乎筆舌以傳之哉但能凝然靜定念中無念工夫純粹打成一片終日嘿嘿如鷄抱卵則神歸氣復自然見元關一竅其大無外其小無内則是採取先天一炁以為金丹之母勤而行之指日可與古仙並駕矣此乃已試之效騐學仙者無所指南謹集問答之要名之曰脩仙辨惑論爾時衆真聆是論已各各歓欣卽採紫清成句為世人賀而讚歎曰一言半句便通元何用丹書千萬篇人若不為形所累眼前便是大羅天衆真俱讚嘆已各復稽首回向道前拜猶未起忽聞元虚唱奉仙樂盈空鍚鸞和鈴之聲振于諸境俄而紫雲下墜天寶花飛鸞鳳羣翔獅麟率舞俄而金光下注旄節擁擠珠輦寶輿乘雲而出侍宸捧勅典禁御函百萬虎賁導引髙明大帝慈悲大帝天醫大帝三大天真蹡蹡而至逕下中宫于是文尼道君率諸僚衆各各齊跪俯伏聽宣太上開天執符御歴含貞體道金闕至尊昊天玉皇上帝勑曰蚩蚩下民鮮克顧天孑孑善種念岐倚偏朕不罔罪蒼生祗爾厥辟厥辟宅師旁資俊乂永敬大恤顧諟神母敷化洋洋便宜警化降祥降殃設中民心式敷民徳格于上下惟帝子奉若天道建設僚屬惟諸僚屬皆與帝子共此大願共此大力共此大功朕無私覆惟有功烈于民者則寵錫以旌朕今多爾前功叙欽爾眾特命三省彙集金經玉科大告誥于靈開以大賚爾衆真香火于下土使方方供奉䖏䖏欽崇惟帝子悉喻朕命惟衆真咸體道心恊裨道化欽哉毋忽爾時三大天真恭宣勅已侍宸典禁出大金函并諸寵錫文尼道君率諸僚屬百拜謝恩恭敬領受卽隨天使逕上彌羅百拜朝天而上奏曰臣嵓不徳重膺帝簡開化迄今已𡻕星九百餘週雖歴經採訪億萬千衆上貢闕下兩遘選仙臣孫䖏機玉蟾逓登選首餘各普䝉天選此皆仰頼聖恩不遺下體是亦諸臣之行力于臣何功若夫六道四生臣究未能全度時臣嵓之辜迺䝉勅奨謂多前功且賜經科顯臣本行臣實惶恐無旣臣屬衆僚皆臣同選均承恩㫖叠降人天現身説法贊䕶君王普勷育化洵稱上體聖衷下完本願今得安䖏天宫分神恊化其銘心感激雖窮刼盡神猶將謂未報天恩于億一今更悚叨大賚咸賜香壇以鼓舞臣僚臣與衆臣惟願刼刼生生恊勷帝治度彼蠢靈咸完天賦無一沉迷以對揚天尊休命謹肅陳表謝百拜以聞于是玉帝覧斯奏已慈顔霽色而告文尼道君曰帝子惟兹下民普恊于中鮮干予正四方風動國泰民安惟帝子與諸真之休帝子克勤于功克顯于道不自滿假成允成功朕故懋乃徳嘉乃丕績帝子今爾大法濟于下土而内庭天政又資帝子相之神霄旣湏判令大羅復頼裁成而下土文衡還當磨勘其六道四生一有不悟道帝子則又曰時予辜帝子勤哉帝子上下三界周歴十方億億化身以勤天職朕當與帝子權俾帝子指揮如意如朕親臨爾時玉帝卽出金令徧召天罡太乙雷霆雨暘璇璣樞機靈寶四將行醫二將掌雷五將復召先天主將并其部屬及一切直符大將暨元圃二十四大天將各重勅以贊䕶立極之㫖承符即應聞召即来一如金令復勅九陽上將飛天㨗將率領無量神王金剛力士輪日隂陽以鍳䕶宗壇以巡䕶九州元壇時諸帥將各各欽領玉勅已玉帝復告諸帥將曰凡兹下民有能受持如此心印集經子等覆䕶其身如䕶已身凡有祈求俾如所願其自命為上士者錫以代天宣化為國治民效如其願之福自居為中士者錫以文章華國詩禮傳家没名不朽之福自分為下士者錫以聰明智慧安樂康𡨴患難不侵之福其有國王大臣為民利濟持誦是經者錫以風調雨順物阜民康境土清平萬民頌徳之福其有皈命元門專志上昇持誦是經者錫以脩真有路進道無魔福縁善慶行滿功圓元祖同超之福其皈命符法專力濟人持誦是經者錫以摧邪輔正轉禍成祥即時應騐威震羣魔之福其或一切星災命厄或疾病或水火或盗賊或刀兵或求嗣息或求種種福縁持誦是經者錫以災消厄觧多福多夀多男子之福其或素行本惡忽使遷善矢心懴悔持誦是經者錫以赦罪注生一切邪縁不敢凑近之福其或煉度宗親普資魂爽持誦是經者錫以地獄觧圍天堂引慶上資九祖下蔭九孫之福何以故其能持心印集經者卽知以心行道以道持身必能行如是功必能獲如是福要知此經天之經也地之義也民之行也人能則天之經因地之義以順天下其身卽帝子身也卽朕身也卽道身也即道藏功徳身也其能欽奉帝子朝謁真靈久而不怠自然道炁霞蒸邪縁雲散功崇徳盛為庶民師是經功徳雖竭河源稱讚難窮其功徳力正復如是其有暴慢不仁毁諸經教不自力學叛道怨師當隨其過大小刼刼降罰苦惱無窮罪報未盈雖遇覃恩不通懴悔朕于十二月十二時常遣闕下神將下巡人天行罰布災帝子亦不得慈悲蔭庇焉帝子其有立願行善而應遭命刼者帝子即上咨璇璣府府有億萬神将主直十二月十二時玉扎帝子扎以咨斗當随其願之大小增禄延齡俾其善願皆得成就何以故天下多一日善人卽多一日利益其有謗道叛教巧惑衆生作種種惡不顧天理不畏王法帝子扎以咨斗當随其惡之大小奪禄减筭顯犯法誅復加冥責或肆其毒而厚滅之以其頑靈永禁寒冰其有寶佩是經自度度人或轉轉施送或為愚民方言觧説開悟一切如此等人是與帝子同化度心卽得稱為靈寳真人其功徳力不可思議凡兹下民聞經鼓舞智者志心受持愚者鋪設是經稱九天號㸃字而拜其所受福利不止無量恒河沙數其有寡于智慧專心持誦是經于行止坐卧䖍誦大洞玉章及黄華及隱語造次不失心與神會或七日或九日或七七日或九九日或百日或百四十日或百八十日或二百一十日或二百七十日或三百日卽得心開靈悟于其經史覧無遺義繼復信心不退當得信口經綸信筆珠璣人人寶奉證大文明其或妖魔纒擾鬼恠作祟或本人或眷屬或延道侣皈神帝子潔壇焚香繕申章奏體誦是經繼復供奉是經當有無量神王金剛力士在在擁䕶一切邪靈自然消滅更能奉行不怠當得法體圓靈或偶發聲或偶行動鬼神欽仰魔道消鎔其威神力不可思議其有傳度弟子而恐其不克保受則先付黄華一篇命其行住坐卧專䖍默誦純心反照然後付以全經使其體誦自得願力堅固精進無窮越上乗而登聖境六通具足三教圓明其光明力不可推測帝子是五方三元符命是平天成地和洽五行今法運至汝當唘傳下土鎮馭五行永保塵刼使棲仙宅靈帝子汝于龍漢初年恭奉玉清神母元君懿㫖陶鑄凡民經五百刼即得同寰一性同覺一光今古古今本無異局帝子當作如是觀帝子自克圓如是願帝子今汝往返演汝政敷汝功恊于皇極咸中有慶惟爾衆真其簡懋爾猷用憲顯爾大願帝子其諧爾衆僚允治九天載采采凡民于在位時諸帥將神君各亦稽首領命文尼道君復百拜謝恩跪受金令恭率僚衆文武神員各各稽首奉辭而退咸詣靈開道君復登上座而告諸真衆曰此天地之經而民是則之将見吾願不速而成吾化不嚴而治長年聖治永慶昇平海晏河清萬民熈皥以仰副神母元始玉帝無量度人之慈諭特憫吾心印昭昭在人間哀此下民得心印者或寡矣爾時道君發是嘆已在㑹真衆各各含悲俯仰妙道而發願曰願我衆生得九天心印者當心誠意切畏俗懷真磨礱智慧保惜精神守龍游之靜定戒蝸角之浮生永持勿失可以入聖願我衆生得九天心印者當得失勿累寵辱不驚不以細事而苟且不以難事而因循于人無嗔怒守已自精誠戒之勉之自然登真願我衆生得九天心印者事親克孝治家克勤竭力盡敬婉色怡聲出入必告疾病惟謹不以艱難而失節不以狂暴而輕身勤勤夙夜斯為務本願我衆生得九天心印者視他人之父母猶已之父母視他人之得失猶已之得失誠可達乎孝孝可達乎誠執于為已者無真不妄切于為人者無妄不真秉之久久自度度人願我衆生得九天心印者隱居克堅其志顯達克致其道勿以富貴而䘮節勿以貧賤而累心噐量惟宏雖大行而不加操脩惟謹雖窮居而不𢰺夕惕朝乾守之自正願我衆生得九天心印者當洗滌彌堅毋堕炎魔之刼操持匪懈直臻真一之階萬事何心入孝出忠為本領一身無障内仁外義作干城生死兩端圈中幻影仙凢同轍實際真憑不阿邪見而成至人願我衆生得九天心印者言有餘而勿輕于口氣不足而勿苦于神輕于出者禍必大忘乎入者病必深謹之在口慎之在身恒行不輟道炁自存願我衆生得九天心印者息爾三昧堅爾一誠勿因氣怒而亂性勿因外喜而溺情懲忿則真火自降窒慾則真水自升水火旣濟始可長生願我衆生得九天心印者脩煉中庭如帝臨天鑒相在爾室如龍見雷聲勿自欺于衾影勿遺摘于鬼神俯仰無愧乃為自明願我衆生得九天心印者靜而生慧三教合一慈而能廣萬物同仁不以私智而争岐路不以浮游而致傷生大功勿伐小過必𤯝終身誦之可以希聖願我衆生得九天心印者知夙緣之深重要保性根知今生之汚穢要種善因見聞非易勿恃才而矜能天神洞鑒勿䘮徳而敗倫知往察來利用兢兢願我衆生得九天心印者身淪塵刼未易超升知用恩于害無庸棄妻子于等閒知用害于恩莫繫戀兒女于一切澹泊所以明志貪欲必致傷生志于道者端以自明願我衆生得九天心印者脩持有候沖舉有衡守定慧于水火任顛倒于乾坤母好竒而窮搜幻術母欲速而輕怨師尊廣積隂功自來福報堅持正論必獲飛昇願我衆生得九天心印者保精固氣混煉元神守至道而待逄縁會重真傳而勿示匪人帝之所寶惟徳非情道君開化為度衆生知此宗㫖元亨利貞願我衆生得九天心印者孝弟以敦本忠信以居心勤儉以守已寛厚以與人忍辱以消禍善養以厚生仁慈以及物知足以操存以此八寳供養三清爾時衆真發是願已各各稽首遥禮玉皇奉辭道君而歸其職玉清贊化九天演政心印集經巻下終讚臣今徧誦三巻金經香壇處處盡朝真心印度羣生徧宇皆春悲願感洪深大聖興行妙道大天尊三稱此處接誦神咒或三遍七遍九遍或至七七遍九九遍或百遍或百單八遍或跪言奉或立誦或繞壇念俱可玉清贊化九天演政心印神咒唵缽囉缽囉三缽囉三缽囉印尼𨽾野彌輪陀尼含魯含魯哲利予哲利予哲利予娑訶唵捺麻薩曼怛勃答喃啊缽囉缽囉缽囉諦曷怛設薩捺喃怛的牙怛的牙怛的牙塔唵渴渴渴兮渴兮吽吽撮辣撮辣缽囉缽囉缽囉撮辣缽囉缽囉缽囉撮辣諦實吒諦實吒諦實吒諦實吒諦實吒諦實吒實致哩實致哩實致哩實致哩實致哩實致哩厮波厮波厮波吒厮波厮波厮波吒扇定孤嚕實哩實哩實哩耶莎訶唵摩利支𠴏莎訶奄利牛奄利牛利牛奄奄利奄奄利牛牛莎訶玉清贊化九天演政心印神咒終誦經已竟兆等䖍誠皈依如願稽首皈依無上道願衆生世世生生皈神體大道一心回向無上道寶大慈尊稽首皈依無上經願衆生世世生生皈命持妙經一心回向無上經寶大慈尊稽首皈依無上師願衆生世世生生皈身事聖師一心回向無上師寶大慈尊旣申回向如願奉行
