body:
  text: 玉清贊化九天演政心印集經經序文昌帝君曰經以集名志義也心印産子神母發于元始闡自大洞真儒而冶以成文是集義所生者非義襲而取之也大洞真儒以普度心化世而一貫夫三教根源其設教也萬戶齊開登證路廣誠以帝謂凡兹下民皆元始種惟降日降非降遂降故其言曰種草不齊有教無類皇風蕩蕩遍宇皆春無不可化之民人而入道莫先于敦本是一秉乎大孝必仙大忠必神之旨而集其大成余談經演教于九天之上寓權機于大洞真儒其指揮如意不速而成是真化工之關鍵儒教之梯航也人能體是經而心廣體胖用是經而金聲玉振以之正心誠意修齊治平為上士為中士為下士惟其所願猗歟美哉亦何必盡人而黃冠草褐始謂歸依于無上宫哉兹因是經之初傳而降此幾鉤墨于簡端亦取諸集以成書敷落神真云爾
